name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi

      - name: Syntax check C sources
        run: |
          find . -name '*.c' -o -name '*.h' | head -20
          for f in $(find . -maxdepth 1 -name '*.c' -o -name '*.h'); do
            echo "Checking $f"
            arm-none-eabi-gcc -fsyntax-only -mcpu=cortex-m4 -mthumb "$f" 2>&1 || true
          done
          echo "Syntax check complete"
